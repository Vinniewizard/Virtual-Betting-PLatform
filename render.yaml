services:
  - type: web
    name: betting-server
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: JWT_SECRET
        sync: false
      - key: PORT
        value: "3001"
      - key: SEED_ADMIN_USERNAME
        sync: false
      - key: SEED_ADMIN_PASSWORD
        sync: false
      - key: SEED_ADMIN_BALANCE
        value: "10000"
      - key: LIPANA_API_KEY
        sync: false
      - key: LIPANA_WEBHOOK_SECRET
        sync: false
      - key: DEFAULT_MIN_BET
        value: "1"
      - key: DEFAULT_MAX_BET
        value: "1000"
      - key: MAX_BODY_SIZE_BYTES
        value: "102400"
      - key: DB_FILE
        value: /var/data/betting.db
    disk:
      name: betting-data
      mountPath: /var/data
      sizeGB: 1
